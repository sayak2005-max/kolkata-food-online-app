<!DOCTYPE html>
<html>
<head>

<title>Your Cart</title>

<style>

body{
font-family:Arial;
background:#fff8f0;
padding:40px;
}

.container{
width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 4px 10px rgba(0,0,0,0.2);
}

.cart-item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #ddd;
}

button{
background:#28a745;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
}

.remove{
background:#dc3545;
}

textarea{
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Your Cart</h2>

{% for item in cart %}

<div class="cart-item">

<span>{{ item.name }}</span>

<span>₹{{ item.price }}</span>

<span>Qty: {{ item.quantity }}</span>

</div>

{% empty %}

<p>Your cart is empty</p>

{% endfor %}


<form method="POST" action="/checkout/">

{% csrf_token %}

<label>Special Instructions</label>

<textarea name="note"
placeholder="Less spicy / extra sauce etc">

</textarea>

<br><br>

<button type="submit">

Proceed to Checkout

</button>

</form>

</div>

</body>
</html>
