<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.dashboard{
width:700px;
margin:auto;
background:white;
padding:30px;
margin-top:50px;
border-radius:10px;
box-shadow:0px 4px 12px rgba(0,0,0,0.2);
}

.card{
background:#ff6347;
color:white;
padding:20px;
margin:15px 0;
border-radius:6px;
}

</style>

</head>

<body>

<div class="dashboard">

<h2>Restaurant Dashboard</h2>

<div class="card">

Total Revenue: ₹{{ revenue.total_price__sum }}

</div>

<div class="card">

Total Orders: {{ orders }}

</div>

<div class="card">

Registered Customers: {{ customers }}

</div>

<a href="/admin/">

Open Admin Panel

</a>

</div>

</body>
</html>
