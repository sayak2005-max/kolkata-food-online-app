{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kolkata Food - Home</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#fff8f0;
}

/* HEADER */

header{
background:#ff6347;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
font-size:26px;
}

/* NAVBAR */

nav ul{
display:flex;
list-style:none;
gap:20px;
}

nav ul li a{
color:white;
text-decoration:none;
font-weight:bold;
font-size:16px;
}

nav ul li a:hover{
text-decoration:underline;
}


/* HERO SECTION */

.hero{

background:url("{% static 'images/pngtree-restaurant-food-menu-background-picture-image_1046420.jpg' %}")
no-repeat center/cover;

height:75vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;
text-align:center;

position:relative;

}

.hero::before{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.45);

}

.hero-content{

position:relative;

z-index:2;

}

.hero h2{

font-size:48px;
margin-bottom:15px;

}

.hero p{

font-size:20px;
margin-bottom:25px;

}

/* CTA BUTTON */

.cta-btn{

background:#ff6347;

padding:15px 30px;

border:none;

color:white;

font-size:18px;

border-radius:6px;

cursor:pointer;

}

.cta-btn:hover{

background:#e5533c;

}


/* FEATURE BUTTON SECTION */

.features{

display:flex;

justify-content:center;

gap:20px;

margin:40px;

flex-wrap:wrap;

}

.feature-btn{

background:white;

padding:20px 30px;

border-radius:10px;

box-shadow:0px 4px 12px rgba(0,0,0,0.15);

text-decoration:none;

color:#333;

font-weight:bold;

transition:0.2s;

}

.feature-btn:hover{

transform:scale(1.05);

}


/* FOOTER */

footer{

background:#333;

color:white;

text-align:center;

padding:15px;

margin-top:30px;

}

</style>

</head>


<body>


<header>

<h1>Kolkata Food 🍽️</h1>

<nav>

<ul>

<li><a href="/order/">Menu</a></li>

<li><a href="/order-history/">Orders</a></li>

<li><a href="/profile/">Profile</a></li>

<li><a href="/about/">About</a></li>

<li><a href="/logout/">Logout</a></li>

</ul>

</nav>

</header>



<section class="hero">

<div class="hero-content">

<h2>Welcome to Kolkata Food</h2>

<p>Authentic Bengali Taste Delivered Fast 🚀</p>

<a href="/order/">

<button class="cta-btn">

Order Now

</button>

</a>

</div>

</section>



<section class="features">

<a href="/order/" class="feature-btn">

🍛 Browse Menu

</a>


<a href="/order-history/" class="feature-btn">

📦 Order History

</a>


<a href="/profile/" class="feature-btn">

👤 My Profile

</a>


<a href="/dashboard/" class="feature-btn">

📊 Admin Dashboard

</a>

</section>



<footer>

© 2026 Kolkata Food | Authentic Bengali Cuisine

</footer>


</body>

</html>
