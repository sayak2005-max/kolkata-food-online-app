<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{

margin:0;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
to right,
#ff9966,
#ff5e62
);

font-family:Arial;

}


.login-box{

background:white;

padding:40px;

border-radius:10px;

box-shadow:0px 6px 20px rgba(0,0,0,0.3);

text-align:center;

width:320px;

}


h2{

margin-bottom:25px;

}


input{

width:100%;

padding:12px;

margin-bottom:20px;

border-radius:6px;

border:1px solid #ccc;

font-size:16px;

}


button{

width:100%;

padding:12px;

background:#ff6347;

color:white;

border:none;

font-size:18px;

cursor:pointer;

border-radius:6px;

}


button:hover{

background:#e5533c;

}


a{

display:block;

margin-top:20px;

text-decoration:none;

color:#333;

font-weight:bold;

}

</style>

</head>


<body>

<div class="login-box">

<h2>Login Using Mobile Number</h2>

<form method="POST">

{% csrf_token %}

<input
type="text"
name="mobile"
placeholder="Enter Mobile Number"
required
>

<button type="submit">

Login

</button>

</form>

<a href="/">

Back

</a>

</div>

</body>

</html>
